name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm ci --prefix frontend

      - name: Build
        run: npm run build --prefix frontend
        env:
          VITE_SUPABASE_URL: https://yecjjhdrrzerjohzasyf.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_eq2d2LRNzl7NBxLoinQjYw_xOq383Gc

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
